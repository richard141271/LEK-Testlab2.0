name: LEK-TestLab2

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: lek-testlab2-pages
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    outputs:
      test_status: ${{ steps.playwright.outcome }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright
        id: playwright
        continue-on-error: true
        run: npm run test:e2e

      - name: Build Pages site
        if: always()
        run: npm run build:pages

      - name: Configure GitHub Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: .site

  deploy:
    runs-on: ubuntu-latest
    needs: test-and-build
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  fail-on-test-errors:
    runs-on: ubuntu-latest
    needs:
      - test-and-build
      - deploy
    if: always() && needs.test-and-build.outputs.test_status != 'success'
    steps:
      - name: Mark workflow as failed when tests fail
        run: |
          echo "Playwright rapporterte feil. Dashboardet er fortsatt publisert til GitHub Pages."
          exit 1
